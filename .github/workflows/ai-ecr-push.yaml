name: AI ECR Push

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ai-ecr-push.yaml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    name: Prepare image metadata
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      target_env: ${{ steps.meta.outputs.target_env }}

    steps:
      - name: Create image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TARGET_ENV="prod"
            IMAGE_TAG="prod-${SHORT_SHA}"
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            TARGET_ENV="dev"
            IMAGE_TAG="dev-${SHORT_SHA}"
          else
            echo "AI ECR push는 dev 또는 main 브랜치에서만 실행합니다."
            exit 1
          fi

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "TARGET_ENV=$TARGET_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG"

  build-and-push:
    name: Build and push AI image
    runs-on: ubuntu-latest
    needs: prepare

    environment:
      name: ${{ needs.prepare.outputs.target_env }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.ECR_AI_WORKER_REPOSITORY }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION GitHub Variable이 필요합니다."
            exit 1
          fi

          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "AWS_ROLE_ARN GitHub Variable이 필요합니다."
            exit 1
          fi

          if [ -z "$ECR_REPOSITORY" ]; then
            echo "ECR_AI_WORKER_REPOSITORY GitHub Variable이 필요합니다."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Build image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" .

          echo "Push image: $IMAGE_URI"
          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI"
