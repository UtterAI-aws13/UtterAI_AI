<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>UtterAI Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; color: #cdd6f4; font-family: 'SF Mono','Fira Code',monospace; overflow: hidden; height: 100vh; }
#graph { width: 100vw; height: 100vh; }

/* ── edges ── */
.link { transition: stroke 0.15s, opacity 0.15s; }
.link-rag   { stroke: #45475a; stroke-width: 1.8; }
.link-cross { stroke: #313244; stroke-width: 1.2; stroke-dasharray: 5 3; }
.link-paper { stroke: #1e1e2e; stroke-width: 1; stroke-dasharray: 2 4; }
.link.highlighted { stroke-width: 2.5 !important; opacity: 1 !important; }
.link.dimmed { opacity: 0.04 !important; }

/* ── nodes ── */
.node circle { cursor: pointer; stroke-width: 1.8; transition: filter 0.2s; }
.node circle:hover { filter: drop-shadow(0 0 9px currentColor); }
.node.highlighted circle { stroke: #fff !important; filter: drop-shadow(0 0 10px #cdd6f4); }
.node.dimmed circle { opacity: 0.12; }
.node.dimmed text { opacity: 0.08; }
.node text {
  font-size: 10px; fill: #cdd6f4; pointer-events: none;
  text-shadow: 0 1px 4px #0f1117, 0 0 8px #0f1117;
}
.node.rag-node text { font-size: 11px; font-weight: 600; }

/* ── tooltip ── */
#tooltip {
  position: fixed; background: #1e1e2e; border: 1px solid #313244;
  border-radius: 8px; padding: 10px 14px; font-size: 11px;
  max-width: 320px; pointer-events: none; opacity: 0;
  transition: opacity 0.12s; z-index: 20; line-height: 1.7;
}
#tooltip.visible { opacity: 1; }
#tooltip .tt-title { font-weight: 700; font-size: 12px; color: #89b4fa; margin-bottom: 4px; }
#tooltip .tt-badge {
  display: inline-block; font-size: 9px; padding: 1px 5px;
  border-radius: 4px; margin-right: 3px; margin-bottom: 5px; font-weight: 700;
}
#tooltip .tt-desc { color: #a6adc8; font-size: 11px; margin-top: 3px; }
#tooltip .tt-meta { color: #6c7086; font-size: 10px; margin-top: 4px; }

/* ── legend ── */
#legend {
  position: fixed; top: 14px; left: 14px;
  background: rgba(30,30,46,0.88); border: 1px solid #313244;
  border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(8px);
}
#legend h3 { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #6c7086; margin-bottom: 7px; }
.legend-section { margin-bottom: 9px; }
.legend-section:last-child { margin-bottom: 0; }
.legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-rect { width: 12px; height: 4px; border-radius: 2px; flex-shrink: 0; }
.legend-label { color: #a6adc8; }

/* ── controls ── */
#controls {
  position: fixed; top: 14px; right: 14px;
  background: rgba(30,30,46,0.88); border: 1px solid #313244;
  border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(8px);
}
#controls h3 { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #6c7086; margin-bottom: 7px; }
.ctrl-btn {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
  cursor: pointer; font-size: 10px; color: #a6adc8; user-select: none;
}
.ctrl-btn input { accent-color: #89b4fa; }
.ctrl-btn:hover { color: #cdd6f4; }

/* ── hint ── */
#hint { position: fixed; bottom: 12px; right: 14px; color: #45475a; font-size: 9px; text-align: right; line-height: 1.9; }
</style>
</head>

const svg = d3.select("#graph");
const W = window.innerWidth, H = window.innerHeight;
svg.attr("width", W).attr("height", H);
const g = svg.append("g");

svg.call(d3.zoom().scaleExtent([0.15,5]).on("zoom", e => g.attr("transform", e.transform)))
   .on("dblclick.zoom", null);

// markers
const defs = svg.append("defs");
[["rag","#45475a"],["cross","#313244"],["paper","#1e2030"]].forEach(([k,c]) => {
  defs.append("marker").attr("id","arr-"+k)
    .attr("viewBox","0 -5 10 10").attr("refX",16).attr("refY",0)
    .attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,-5L10,0L0,5").attr("fill",c).attr("opacity",0.6);
});

// ──────────────────────────────────────────────
// LINK RENDERING
// ──────────────────────────────────────────────
function buildLinks() {
  const ragOn   = document.getElementById("tog-rag").checked;
  const crossOn = document.getElementById("tog-cross").checked;
  const paperOn = document.getElementById("tog-paper").checked;

  const all = [
    ...(ragOn   ? LINKS_RAG.map(l=>({...l,kind:"rag"}))   : []),
    ...(crossOn ? LINKS_CROSS.map(l=>({...l,kind:"cross"})): []),
    ...(paperOn ? LINKS_PAPER.map(l=>({...l,kind:"paper"})): []),
  ].map(l => ({ source:l.s, target:l.t, label:l.label, kind:l.kind }));
  return all;
}

let linkData = buildLinks();

const linkGroup = g.append("g").attr("class","links");
const nodeGroup = g.append("g").attr("class","nodes");

function getNodeColor(d) {
  if (d.cat === "rag")   return RAG_CAT[d.ragCat];
  if (d.cat === "paper") return PAPER_AGE[d.age];
  return "#888";
}

function shortLabel(d) {
  return d.label;
}

// ──────────────────────────────────────────────
// SIMULATION
// ──────────────────────────────────────────────
let sim;
function buildSim(links) {
  if (sim) sim.stop();
  sim = d3.forceSimulation(NODES)
    .force("link", d3.forceLink(links).id(d=>d.id)
      .distance(d => d.kind === "rag" ? 100 : d.kind === "cross" ? 140 : 80)
      .strength(d => d.kind === "rag" ? 0.5 : d.kind === "cross" ? 0.25 : 0.3))
    .force("charge", d3.forceManyBody().strength(d => d.cat==="rag" ? -350 : -180))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("collision", d3.forceCollide(d => d.r + (d.cat==="rag"?14:8)));
  return sim;
}

function render(links) {
  // links
  linkGroup.selectAll("line").remove();
  const linkSel = linkGroup.selectAll("line")
    .data(links).join("line")
    .attr("class", d => `link link-${d.kind}`)
    .attr("marker-end", d => `url(#arr-${d.kind})`);

  // nodes
  nodeGroup.selectAll("g").remove();
  const nodeSel = nodeGroup.selectAll("g")
    .data(NODES).join("g")
    .attr("class", d => `node ${d.cat==="rag"?"rag-node":"paper-node"}`)
    .call(d3.drag()
      .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  nodeSel.append("circle")
    .attr("r", d=>d.r)
    .attr("fill", d => getNodeColor(d)+"22")
    .attr("stroke", d => getNodeColor(d));

  nodeSel.append("text")
    .attr("dy", d => d.r+12)
    .attr("text-anchor","middle")
    .text(d => shortLabel(d));

  // tooltip
  const tooltip = document.getElementById("tooltip");
  nodeSel.on("mouseover", function(e,d) {
    const color = getNodeColor(d);
    const badges = d.cat==="rag"
      ? `<span class="tt-badge" style="background:${color}30;color:${color}">${d.ragCat}</span>`
      : [
          d.age && `<span class="tt-badge" style="background:#31324444;color:#a6adc8">${d.age}</span>`,
          d.year && `<span class="tt-badge" style="background:#31324444;color:#6c7086">${d.year}</span>`,
          ...(d.metric||[]).map(m=>`<span class="tt-badge" style="background:#89b4fa22;color:#89b4fa">${m}</span>`),
          ...(d.task||[]).map(t=>`<span class="tt-badge" style="background:#a6e3a122;color:#a6e3a1">${t}</span>`),
        ].filter(Boolean).join("");
    tooltip.innerHTML = `
      <div class="tt-title">${d.file||d.label}</div>
      <div>${badges}</div>
      <div class="tt-desc">${d.desc || d.title || ""}</div>
      ${d.lang ? `<div class="tt-meta">영역: ${d.lang.join(", ")}</div>` : ""}
      ${d.doi ? `<div class="tt-meta">DOI: ${d.doi}</div>` : ""}
    `;
    tooltip.classList.add("visible");
  }).on("mousemove", function(e) {
    const x = e.clientX+14, y = e.clientY-10;
    const tw = tooltip.offsetWidth;
    tooltip.style.left = (x+tw>window.innerWidth ? x-tw-28 : x)+"px";
    tooltip.style.top  = Math.min(y, window.innerHeight-tooltip.offsetHeight-10)+"px";
  }).on("mouseout", ()=>tooltip.classList.remove("visible"));

  nodeSel.on("click", function(e,d) {
    e.stopPropagation();
    const neighborIds = new Set([d.id]);
    const neighborLinks = new Set();
    links.forEach((l,i) => {
      const s = l.source.id||l.source, t = l.target.id||l.target;
      if (s===d.id||t===d.id) { neighborIds.add(s); neighborIds.add(t); neighborLinks.add(i); }
    });
    nodeSel.classed("highlighted", n=>neighborIds.has(n.id))
           .classed("dimmed", n=>!neighborIds.has(n.id));
    linkSel.classed("highlighted",(_, i)=>neighborLinks.has(i))
           .classed("dimmed",(_, i)=>!neighborLinks.has(i));
  });

  svg.on("click", ()=>{
    nodeSel.classed("highlighted dimmed", false);
    linkSel.classed("highlighted dimmed", false);
  });

  const s = buildSim(links);
  s.on("tick", ()=>{
    linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
           .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
  });
}

render(linkData);

// toggle handlers
["tog-rag","tog-cross","tog-paper"].forEach(id => {
  document.getElementById(id).addEventListener("change", ()=>{
    linkData = buildLinks();
    render(linkData);
  });
});

window.addEventListener("resize", ()=>{
  const W2=window.innerWidth, H2=window.innerHeight;
  svg.attr("width",W2).attr("height",H2);
  sim.force("center",d3.forceCenter(W2/2,H2/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
