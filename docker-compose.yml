services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: utterai_postgres
    environment:
      POSTGRES_USER: utterai
      POSTGRES_PASSWORD: utterai
      POSTGRES_DB: utterai_ai
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

volumes:
  pgdata:
